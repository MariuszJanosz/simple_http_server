<!DOCTYPE html>
<html>
  <head>
    <title>NGGYU</title>
  </head>
  <body>
    <div>
      <video width="640" height="360" controls>
        <source src="/nggyu.mp4" type="video/mp4">
      </video>
    </div>
  </body>
  <script defer>
    const video = document.querySelector("video");
    document.addEventListener("pointerdown", async () => {
      await video.play();
    });
    document.addEventListener("keydown", async () => {
      await video.play();
    });
  </script>
</html>
